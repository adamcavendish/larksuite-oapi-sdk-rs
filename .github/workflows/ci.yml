name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  RUSTFLAGS: -Dwarnings
  RUST_BACKTRACE: 1
  rust_min: "1.95.0"

defaults:
  run:
    shell: bash

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: taiki-e/install-action@just
      - run: just fmt-check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@just
      - run: just clippy

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -Dwarnings
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@just
      - run: just doc-check

  go-contract-provenance:
    name: Go Contract Provenance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
      - uses: actions/checkout@v6
        with:
          repository: larksuite/oapi-sdk-go
          ref: v3.9.9
          path: .go-sdk
          fetch-depth: 0
      - uses: taiki-e/install-action@just
      - run: just go-contract-provenance-check "$GITHUB_WORKSPACE/.go-sdk"

  basics:
    name: Basics
    runs-on: ubuntu-latest
    needs: [fmt, clippy, doc, go-contract-provenance]
    steps:
      - run: exit 0

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [basics]
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - uses: taiki-e/install-action@just
      - run: just test-all

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [basics]
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: coverage
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@nextest
      - run: cargo llvm-cov nextest --workspace --all-features --lcov --output-path lcov.info
      - run: cargo test --doc --workspace
      - uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    needs: [basics]
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.rust_min }}
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@just
      - run: just msrv

  publish-dry-run:
    name: Publish (dry run)
    runs-on: ubuntu-latest
    needs: [basics]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish --dry-run
